<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arkanoid Mobile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Start screen -->
  <div id="startScreen" class="screen">
    <h1>Arkanoid Mobile</h1>
    <button id="startButton">Start</button>
  </div>

  <!-- Game Canvas -->
  <canvas id="gameCanvas"></canvas>

  <!-- End screen -->
  <div id="endScreen" class="screen hidden">
    <h2 id="endMessage"></h2>
    <div class="button-group">
      <button id="restartButton">Start Again</button>
      <button id="exitButton">Exit</button>
    </div>
  </div>

  <!-- Audio -->
  <audio id="brickSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" preload="auto"></audio>
  <audio id="endSound" src="https://actions.google.com/sounds/v1/cartoon/concussive_hit_guitar_boing.ogg" preload="auto"></audio>

  <!-- Audi script with MutationObserver -->
  <script>
    const observer = new MutationObserver((mutationsList) => {
      for (const mutation of mutationsList) {
        if (mutation.type === "childList") {
          const endScreen = document.getElementById("endScreen");
          if (!endScreen.classList.contains("hidden")) {
            const endSound = document.getElementById("endSound");
            endSound.currentTime = 0;
            endSound.play();
            if (navigator.vibrate) {
              navigator.vibrate([200, 100, 200]);
            }
          }
        }
      }
    });

    observer.observe(document.getElementById("endScreen"), {
      attributes: false,
      childList: true,
      subtree: true
    });
  </script>

  <!-- Script principal -->
  <script src="script.js"></script>
</body>
</html>
